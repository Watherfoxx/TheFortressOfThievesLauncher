<div class="container">
    <div class="hero-overlay"></div>

    <aside class="left-rail">
        <div class="player-options">
            <div class="player-head"></div>
        </div>

        <div class="social-tab">
            <div class="social-list content-scroll">
                <div data-url="https://thefortressofthieves.fr/discord" class="social-block">
                    <div class="icon-discord icon-social"></div>
                </div>

                <div data-url="https://thefortressofthieves.fr" class="social-block">
                    <div class="icon-web icon-social"></div>
                </div>

                <div data-url="https://www.youtube.com/@thefortressofthieves3585" class="social-block">
                    <div class="icon-youtube icon-social"></div>
                </div>
            </div>
        </div>

        <div class="settings-btn icon-settings"></div>
    </aside>

    <main class="hero-content">
        <div class="hero-brand">
            <h1 class="hero-title">THE FORTRESS<br>OF THIEVES</h1>
            <img class="hero-logo" src="assets/images/icon.png" alt="The Fortress Of Thieves">
        </div>
        <p class="hero-description">Un univers RPG complet, des quêtes épiques et une aventure communautaire unique sur Minecraft.</p>

        <div class="play-elements">
            <div class="play-instance">
                <button class="play-btn">Jouer</button>
                <div class="instance-select icon-arrow"></div>
            </div>
            <div class="info-starting-game">
                <div class="info-starting-game-text">Connexion...</div>
                <progress value="0" max="0" class="progress-bar"></progress>
            </div>
        </div>

        <section class="home-bottom">
            <div class="new-tab">
                <div class="titre-tab-new">DERNIÈRES NEWS</div>
                <div class="news-list content-scroll"></div>
            </div>
        </section>
    </main>

    <div class="instance-popup">
        <div class="instances-tab">
            <div class="close-popup icon-close"></div>
            <p>Choisissez votre instance...</p>
            <div class="instances-List"></div>
        </div>
    </div>
</div>
